<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="35%" stop-color="#06d6a0"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="65%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="40" stroke="#06d6a0" stroke-width=".5" opacity=".03"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#06d6a0" stroke-width=".5" opacity=".03"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <ellipse cx="600" cy="200" rx="400" ry="200" fill="#06d6a0" opacity=".025" filter="url(#ambient)"/>
  <ellipse cx="600" cy="400" rx="300" ry="150" fill="#8b5cf6" opacity=".015" filter="url(#ambient)"/>

  <g transform="translate(600,195)" filter="url(#glow)">
    <path d="M0 55
      C0 100 -44 138 -100 138
      C-170 138 -220 88 -220 28
      C-220 -32 -170 -82 -100 -82
      C-44 -82 0 -44 0 0
      C0 -44 44 -82 100 -82
      C170 -82 220 -32 220 28
      C220 88 170 138 100 138
      C44 138 0 100 0 55Z"
      fill="none" stroke="url(#ribbon)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="600" y="360" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="56" font-weight="700" fill="#f1f5f9" text-anchor="middle" letter-spacing="-1.5">OmniKit</text>

  <rect x="530" y="374" width="140" height="3" rx="1.5" fill="#06d6a0"/>

  <text x="600" y="410" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">Free, browser-based developer tools.</text>
  <text x="600" y="440" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#94a3b8" text-anchor="middle">No sign-up, no tracking — just results.</text>

  <g transform="translate(350,470)">
    <rect width="90" height="28" rx="6" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".2"/>
    <text x="45" y="19" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Hashing</text>

    <rect x="100" width="76" height="28" rx="6" fill="#8b5cf6" fill-opacity=".08" stroke="#8b5cf6" stroke-width="1" stroke-opacity=".2"/>
    <text x="138" y="19" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">Cipher</text>

    <rect x="186" width="76" height="28" rx="6" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".2"/>
    <text x="224" y="19" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Base64</text>

    <rect x="272" width="90" height="28" rx="6" fill="#8b5cf6" fill-opacity=".08" stroke="#8b5cf6" stroke-width="1" stroke-opacity=".2"/>
    <text x="317" y="19" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">Password</text>

    <rect x="372" width="88" height="28" rx="6" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".2"/>
    <text x="416" y="19" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Checksum</text>
  </g>

  <text x="600" y="610" font-family="'JetBrains Mono',monospace" font-size="13" fill="#06d6a0" opacity=".3" text-anchor="middle">omnikit.run</text>

  <text x="30" y="620" font-family="'JetBrains Mono',monospace" font-size="10" fill="#06d6a0" opacity=".03">01001111 01101101 01101110 01101001 01001011 01101001 01110100</text>
</svg>
