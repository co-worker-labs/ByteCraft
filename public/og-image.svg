<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="inf-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06d6a0"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ambient" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="40" x2="40" y2="40" stroke="#06d6a0" stroke-width=".5" opacity=".04"/>
      <line x1="40" y1="0" x2="40" y2="40" stroke="#06d6a0" stroke-width=".5" opacity=".04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <ellipse cx="280" cy="315" rx="260" ry="200" fill="#06d6a0" opacity=".03" filter="url(#ambient)"/>
  <ellipse cx="920" cy="240" rx="200" ry="160" fill="#8b5cf6" opacity=".02" filter="url(#ambient)"/>

  <!-- Left: Infinity Symbol -->
  <g transform="translate(280,315)" filter="url(#glow)">
    <path d="M0 50
      C0 95 -40 125 -90 125
      C-152 125 -195 80 -195 25
      C-195 -30 -152 -75 -90 -75
      C-40 -75 0 -45 0 0
      C0 -45 40 -75 90 -75
      C152 -75 195 -30 195 25
      C195 80 152 125 90 125
      C40 125 0 95 0 50Z"
      fill="none" stroke="url(#inf-g)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- Right: Brand Content -->
  <g transform="translate(540,140)">
    <text x="0" y="80" font-family="'JetBrains Mono',monospace" font-size="68" font-weight="700" fill="#f1f5f9" letter-spacing="-2">OmniKit</text>

    <rect y="98" width="100" height="3" fill="#06d6a0" rx="1.5"/>

    <text y="134" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#94a3b8">A collection of practical, browser-based developer tools.</text>
    <text y="162" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#94a3b8">No sign-up, no tracking — just results.</text>

    <g transform="translate(0,196)">
      <rect width="96" height="30" rx="8" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".25"/>
      <text x="48" y="20" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Hashing</text>

      <rect x="108" width="84" height="30" rx="8" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".25"/>
      <text x="150" y="20" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Cipher</text>

      <rect x="204" width="84" height="30" rx="8" fill="#8b5cf6" fill-opacity=".08" stroke="#8b5cf6" stroke-width="1" stroke-opacity=".25"/>
      <text x="246" y="20" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">Base64</text>

      <rect x="300" width="96" height="30" rx="8" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".25"/>
      <text x="348" y="20" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Password</text>

      <rect y="40" width="96" height="30" rx="8" fill="#8b5cf6" fill-opacity=".08" stroke="#8b5cf6" stroke-width="1" stroke-opacity=".25"/>
      <text x="48" y="60" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">Checksum</text>

      <rect x="108" y="40" width="72" height="30" rx="8" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".25"/>
      <text x="144" y="60" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">ASCII</text>

      <rect x="192" y="40" width="108" height="30" rx="8" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".25"/>
      <text x="246" y="60" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Storage</text>

      <rect x="312" y="40" width="100" height="30" rx="8" fill="#8b5cf6" fill-opacity=".08" stroke="#8b5cf6" stroke-width="1" stroke-opacity=".25"/>
      <text x="362" y="60" font-family="'JetBrains Mono',monospace" font-size="12" fill="#8b5cf6" text-anchor="middle">HTML Code</text>
    </g>
  </g>

  <g transform="translate(72,580)">
    <rect width="160" height="26" rx="13" fill="#06d6a0" fill-opacity=".08" stroke="#06d6a0" stroke-width="1" stroke-opacity=".2"/>
    <text x="80" y="18" font-family="'JetBrains Mono',monospace" font-size="12" fill="#06d6a0" text-anchor="middle">Free &amp; Open Source</text>
  </g>

  <text x="72" y="620" font-family="'JetBrains Mono',monospace" font-size="11" fill="#06d6a0" opacity=".05">01001111 01101101 01101110 01101001 01001011 01101001 01110100</text>
</svg>
